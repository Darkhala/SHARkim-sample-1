<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/images/icon logo.png">

  <title>Product - Sharkim Traders</title>
  <meta name="description" content="View product details, price, features and related items at Sharkim Traders.">

  <!-- Dynamic Canonical -->
  <link rel="canonical" href="/product.html">

  <!-- Open Graph -->
  <meta property="og:title" content="Product - Sharkim Traders">
  <meta property="og:description" content="Find the best deals on electronics and appliances at Sharkim Traders.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/images/sharkim_gold_logo.png">
  <meta property="og:url" content="/product.html">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Product - Sharkim Traders">
  <meta name="twitter:description" content="Find the best deals on electronics and appliances at Sharkim Traders.">
  <meta name="twitter:image" content="/images/sharkim_gold_logo.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js"></script>

  <style>
    html, body { max-width: 100%; overflow-x: hidden; }
    body { font-family: "Times New Roman", Times, serif, Arial, Helvetica, sans-serif; }
    img, svg { max-width: 100%; height: auto; }
  </style>

  <!-- JSON-LD container (must stay pure JSON) -->
  <script type="application/ld+json" id="product-jsonld">{}</script>

  <!-- Schema updater -->
  <script>
    function updateProductSchema(product) {
      const url = `https://sharkimtraders.co.ke/product.html?id=${product.id}`;

      const schema = {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": product.title || product.name,
        "image": [product.image_url || product.image],
        "description": product.description || "Buy this product from Sharkim Traders.",
        "sku": String(product.id || product.sku),
        "brand": {
          "@type": "Brand",
          "name": product.brand || "Sharkim Traders"
        },
        "category": product.category || "Electronics",
        "condition": "NewCondition",
        "offers": {
          "@type": "Offer",
          "priceCurrency": "KES",
          "price": Number(product.price || 0).toFixed(2),
          "priceValidUntil": new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
          "availability": product.stock_quantity > 0 
            ? "https://schema.org/InStock" 
            : "https://schema.org/OutOfStock",
          "itemCondition": "https://schema.org/NewCondition",
          "url": url,
          "seller": {
            "@type": "Organization",
            "name": "Sharkim Traders",
            "url": "https://sharkimtraders.co.ke",
            "address": {
              "@type": "PostalAddress",
              "streetAddress": "Royal Palms Mall, Mombasa Road",
              "addressLocality": "Nairobi",
              "addressRegion": "Nairobi",
              "postalCode": "00100",
              "addressCountry": "KE"
            },
            "telephone": "+254704843554",
            "email": "sharkimtraders97@gmail.com"
          },
          "shippingDetails": {
            "@type": "OfferShippingDetails",
            "shippingRate": {
              "@type": "MonetaryAmount",
              "value": "0",
              "currency": "KES"
            },
            "deliveryTime": {
              "@type": "ShippingDeliveryTime",
              "handlingTime": {
                "@type": "QuantitativeValue",
                "minValue": 1,
                "maxValue": 2,
                "unitCode": "DAY"
              },
              "transitTime": {
                "@type": "QuantitativeValue",
                "minValue": 2,
                "maxValue": 5,
                "unitCode": "DAY"
              }
            }
          }
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.5",
          "reviewCount": "0",
          "bestRating": "5",
          "worstRating": "1"
        }
      };

      document.getElementById("product-jsonld").textContent =
        JSON.stringify(schema, null, 2);

      // ALSO fix canonical + OG dynamically
      document.querySelector('link[rel="canonical"]').href = url;
      document.querySelector('meta[property="og:url"]').content = url;
      document.querySelector('meta[property="og:title"]').content = product.title || product.name;
      document.querySelector('meta[property="og:description"]').content = product.description || "Buy this product from Sharkim Traders.";
      document.querySelector('meta[property="og:image"]').content = product.image_url || product.image;
    }
  </script>

</head>

<body class="bg-gray-50">

<header class="bg-white text-gray-900 shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between mb-3">
      <a href="index.html">
        <img src="images/sharkim_gold_logo.png" class="h-12">
      </a>
      <button id="cartBtn" class="px-4 py-2 bg-red-600 text-white rounded">
        Cart <span id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-4">
  <div class="bg-white rounded shadow p-4 grid md:grid-cols-2 gap-6">

    <!-- IMAGE -->
    <div>
      <img id="pImg" class="w-full h-80 object-contain border">
    </div>

    <!-- INFO -->
    <div>
      <h1 id="pTitle" class="text-2xl font-bold"></h1>
      <p id="pPrice" class="text-red-600 text-2xl font-bold mt-3"></p>

      <div class="mt-4 flex gap-2">
        <button id="btnBuyNow" class="px-4 py-2 bg-black text-white rounded">
          Buy Now
        </button>

        <button id="btnCart" class="px-4 py-2 bg-red-600 text-white rounded">
          Add to Cart
        </button>
      </div>

      <div class="mt-6">
        <h3 class="font-semibold">Description</h3>
        <p id="descText" class="text-sm text-gray-700"></p>
      </div>

    </div>
  </div>
</main>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/supabase.js"></script>
<script src="js/product.js"></script>

</body>
</html>
